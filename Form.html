<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add/Edit Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Book Information</h4>
                </div>
                <div class="card-body">
                    <form id="bookForm">
                        <div class="mb-3">
                            <label class="form-label">Book Title</label>
                            <input type="text" class="form-control" placeholder="Enter book title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Author Name</label>
                            <input type="text" class="form-control" placeholder="Enter author name" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select">
                                    <option>Fiction</option>
                                    <option>Non-Fiction</option>
                                    <option>Science</option>
                                    <option>History</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Price ($)</label>
                                <input type="number" class="form-control" step="0.01">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Book Cover URL</label>
                            <input type="url" class="form-control" placeholder="https://example.com/image.jpg">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Save Book</button>
                            <a href="books.html" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('bookForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Form submitted successfully! (This logic will be handled by C# later)');
    });
</script>
</body>
</html>
