<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaLib - Home</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .hero-section { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); 
                        background-size: cover; color: white; padding: 100px 0; text-align: center; }
        .book-card { transition: transform 0.3s; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .book-card:hover { transform: translateY(-10px); }
        footer { background: #2c3e50; color: white; padding: 20px 0; margin-top: 50px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">LuminaLib</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="books.html">Manage Books</a></li>
                <li class="nav-item"><a class="btn btn-outline-light ms-lg-3" href="#">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero-section">
    <div class="container">
        <h1 class="display-4 fw-bold">Find Your Next Great Read</h1>
        <p class="lead">Explore thousands of books in our digital library.</p>
        <div class="row justify-content-center mt-4">
            <div class="col-md-6">
                <div class="input-group mb-3">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by title or author...">
                    <button class="btn btn-primary" type="button">Search</button>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Book List -->
<div class="container my-5">
    <h2 class="text-center mb-4">Featured Books</h2>
    <div class="row" id="bookContainer">
        <!-- Sample Book 1 -->
        <div class="col-md-3 mb-4">
            <div class="card book-card h-100">
                <img src="https://covers.openlibrary.org/b/id/8225266-L.jpg" class="card-img-top" alt="Book Cover" style="height: 300px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title">The Great Gatsby</h5>
                    <p class="text-muted small">By F. Scott Fitzgerald</p>
                    <span class="badge bg-success mb-2">Available</span>
                    <button class="btn btn-sm btn-outline-primary w-100">View Details</button>
                </div>
            </div>
        </div>
        <!-- Sample Book 2 -->
        <div class="col-md-3 mb-4">
            <div class="card book-card h-100">
                <img src="https://covers.openlibrary.org/b/id/7222246-L.jpg" class="card-img-top" alt="Book Cover" style="height: 300px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title">1984</h5>
                    <p class="text-muted small">By George Orwell</p>
                    <span class="badge bg-danger mb-2">Borrowed</span>
                    <button class="btn btn-sm btn-outline-primary w-100">View Details</button>
                </div>
            </div>
        </div>
        <!-- Add more cards as needed -->
    </div>
</div>

<footer>
    <div class="container text-center">
        <p>&copy; 2023 LuminaLib Management System. All Rights Reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
