<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | Apex Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .user-card { border: none; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .avatar-circle { width: 40px; height: 40px; background-color: #6c5ce7; color: white; 
                         display: flex; align-items: center; justify-content: center; 
                         border-radius: 50%; font-weight: bold; font-size: 14px; }
        .role-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 50px; text-transform: uppercase; }
        .role-admin { background-color: #ff7675; color: #fff; }
        .role-member { background-color: #55efc4; color: #00b894; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-active { background-color: #2ecc71; }
        .status-locked { background-color: #e74c3c; }
        .table thead { background-color: #f8f9fa; color: #636e72; }
    </style>
</head>
<body>

<div class="container mt-5">
    <!-- Header Area -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">User Management</h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="#">Admin</a></li>
                    <li class="breadcrumb-item active">Users</li>
                </ol>
            </nav>
        </div>
        <button class="btn btn-dark shadow-sm">
            <i class="bi bi-person-plus-fill me-2"></i> Add New User
        </button>
    </div>

    <!-- Identity Stats Summary -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card p-3 text-center user-card">
                <h6 class="text-muted">Total Users</h6>
                <h3 class="fw-bold mb-0">1,240</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 text-center user-card border-start border-primary border-4">
                <h6 class="text-muted">Admins</h6>
                <h3 class="fw-bold mb-0">12</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 text-center user-card border-start border-danger border-4">
                <h6 class="text-muted">Locked Accounts</h6>
                <h3 class="fw-bold mb-0">5</h3>
            </div>
        </div>
    </div>

    <!-- User Table -->
    <div class="card user-card">
        <div class="card-header bg-white p-3 border-0">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control bg-light border-0" placeholder="Search by email or name...">
                    </div>
                </div>
                <div class="col-md-8 text-md-end">
                    <button class="btn btn-light btn-sm"><i class="bi bi-filter me-1"></i> Filter</button>
                    <button class="btn btn-light btn-sm"><i class="bi bi-download me-1"></i> Export</button>
                </div>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">User</th>
                        <th>Email Status</th>
                        <th>Roles</th>
                        <th>Lockout Status</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- User 1: Admin User -->
                    <tr>
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <div class="avatar-circle me-3">JD</div>
                                <div>
                                    <div class="fw-bold">John Doe</div>
                                    <div class="text-muted small">john.doe@example.com</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill">
                                <i class="bi bi-check-circle-fill me-1"></i> Verified
                            </span>
                        </td>
                        <td>
                            <span class="role-badge role-admin">Admin</span>
                        </td>
                        <td>
                            <span class="status-dot status-active"></span> Active
                        </td>
                        <td class="text-end pe-4">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-secondary" title="Manage Roles"><i class="bi bi-shield-lock"></i></button>
                                <button class="btn btn-sm btn-outline-secondary" title="Edit Profile"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" title="Lock Account"><i class="bi bi-lock"></i></button>
                            </div>
                        </td>
                    </tr>

                    <!-- User 2: Standard Member (Locked) -->
                    <tr>
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <div class="avatar-circle me-3" style="background-color: #fab1a0;">SM</div>
                                <div>
                                    <div class="fw-bold">Sarah Miller</div>
                                    <div class="text-muted small">sarah.m@test.com</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-pill">
                                <i class="bi bi-exclamation-circle-fill me-1"></i> Pending
                            </span>
                        </td>
                        <td>
                            <span class="role-badge role-member">Member</span>
                        </td>
                        <td>
                            <span class="status-dot status-locked"></span> Locked
                        </td>
                        <td class="text-end pe-4">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-secondary"><i class="bi bi-shield-lock"></i></button>
                                <button class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-success" title="Unlock Account"><i class="bi bi-unlock"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-white p-3 text-center border-0">
            <a href="#" class="text-decoration-none small fw-bold">View All Users <i class="bi bi-arrow-right ms-1"></i></a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
