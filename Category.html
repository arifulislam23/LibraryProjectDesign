<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Category | Apex Admin</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; }
        .card-header { background: #2c3e50; color: white; border-radius: 12px 12px 0 0 !important; }
        .btn-save { background: #27ae60; color: white; transition: 0.3s; }
        .btn-save:hover { background: #219150; color: white; }
        .error-msg { color: #e74c3c; font-size: 0.85rem; display: none; } /* Validation Message */
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Breadcrumb for Navigation -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="admin_dashboard.html">Dashboard</a></li>
                    <li class="breadcrumb-item"><a href="#">Categories</a></li>
                    <li class="breadcrumb-item active">Add New</li>
                </ol>
            </nav>

            <!-- Create Category Card -->
            <div class="card shadow">
                <div class="card-header p-3">
                    <h5 class="mb-0"><i class="bi bi-tags-fill me-2"></i> Create New Category</h5>
                </div>
                <div class="card-body p-4">
                    <form id="categoryForm">
                        <!-- Category Name -->
                        <div class="mb-3">
                            <label for="categoryName" class="form-label fw-bold">Category Name</label>
                            <input type="text" class="form-control" id="categoryName" placeholder="e.g. Science Fiction, Programming" required>
                            <span class="error-msg" id="nameError">Category name is required!</span>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label fw-bold">Description (Optional)</label>
                            <textarea class="form-control" id="description" rows="3" placeholder="Short detail about this category..."></textarea>
                        </div>

                        <!-- Display Status (Checkbox) -->
                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="isActive" checked>
                                <label class="form-check-input-label" for="isActive">Is Active? (Show in list)</label>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-save px-4 shadow-sm">
                                <i class="bi bi-check-circle me-1"></i> Save Category
                            </button>
                            <a href="#" class="btn btn-outline-secondary px-4">
                                <i class="bi bi-x-circle me-1"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Recently Added (Small Preview) -->
            <div class="mt-4 p-3 bg-white border rounded shadow-sm">
                <h6 class="text-muted"><i class="bi bi-clock-history me-2"></i> Recently Added</h6>
                <ul class="list-group list-group-flush small">
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        Programming <span class="badge bg-success rounded-pill">Active</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        History <span class="badge bg-success rounded-pill">Active</span>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</div>

<!-- JavaScript for basic static validation demo -->
<script>
    document.getElementById('categoryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const nameInput = document.getElementById('categoryName');
        const errorMsg = document.getElementById('nameError');

        if (nameInput.value.trim() === "") {
            nameInput.classList.add('is-invalid');
            errorMsg.style.display = 'block';
        } else {
            nameInput.classList.remove('is-invalid');
            errorMsg.style.display = 'none';
            alert('Success: Category "' + nameInput.value + '" saved! (This will be handled by C# Controller later)');
            nameInput.value = "";
        }
    });
</script>

</body>
</html>
